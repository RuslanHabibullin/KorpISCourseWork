services:
  postgres:
    image: postgres:16-alpine
    container_name: carservice_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: carservice
      POSTGRES_PASSWORD: carservice
      POSTGRES_DB: carservice
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U carservice"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    image: golang:1.22-alpine
    container_name: carservice_migrate
    working_dir: /migrations
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations
    environment:
      GOOSE_DRIVER: postgres
      GOOSE_DBSTRING: "host=postgres port=5432 user=carservice password=carservice dbname=carservice sslmode=disable"
    command: >
      sh -c "go install github.com/pressly/goose/v3/cmd/goose@latest &&
            /go/bin/goose up"
    restart: on-failure

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    container_name: carservice_api
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: carservice
      DB_PASS: carservice
      DB_NAME: carservice
      DB_SSLMODE: disable
      HTTP_ADDR: ":8080"
      LOG_LEVEL: info
    ports:
      - "8080:8080"
    restart: unless-stopped

  etl:
    build:
      context: .
      dockerfile: Dockerfile
      target: etl
    container_name: carservice_etl
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: carservice
      DB_PASS: carservice
      DB_NAME: carservice
      DB_SSLMODE: disable
      LOG_LEVEL: info
      ETL_INTERVAL: 1h
      ETL_OUT_DIR: /app/reports
    volumes:
      - etl_reports:/app/reports
    restart: unless-stopped

volumes:
  pg_data:
  etl_reports: